server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Fix L-6: Content-Security-Policy — restricts what the browser is allowed to load.
    # Prevents XSS via injected scripts from bridge adapter errors or compromised CDNs.
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-inline';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: https://assets.coingecko.com;
        connect-src 'self'
            https://api.coingecko.com
            https://api.farolink.xyz
            https://app.farolink.xyz
            https://api-testnet.layerzero-scan.com
            wss://stream.goldsky.com;
        frame-src 'none';
        object-src 'none';
        base-uri 'self';
    " always;

    # Additional security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # SPA fallback — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (hashed filenames from Vite build)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Disable access log for healthcheck noise
    location /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
